name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 # v0.14.0

      - name: Install dependencies
        run: devbox run -- pnpm install --frozen-lockfile

      - name: Check TypeScript formatting
        run: devbox run -- pnpm exec prettier --check .

      - name: Lint TypeScript
        run: devbox run -- pnpm exec eslint . --max-warnings 0

      - name: Type check TypeScript
        run: devbox run -- pnpm exec tsc -b --noEmit
