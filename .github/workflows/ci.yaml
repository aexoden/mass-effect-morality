name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-versions:
    name: Check dependency version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check versions
        run: |
          set -euo pipefail

          check_version() {
            local name="$1"
            shift

            declare -A versions
            while [[ $# -gt 0 ]]; do
              versions["$1"]="$2"
              shift 2
            done

            unique=$(printf '%s\n' "${versions[@]}" | sort -u | wc -l)
            if [[ "$unique" -ne 1 ]]; then
              echo "::error::${name} version mismatch detected:"
              for source in "${!versions[@]}"; do
                echo "  ${source}: ${versions[$source]}"
              done
              exit 1
            fi

            echo "All ${name} versions are consistent: ${versions[devbox]}"
          }

          check_version "Node.js" \
            devbox "$(jq -r '.packages.nodejs' devbox.json)" \
            package_json "$(jq -r '.engines.node' package.json | sed 's/[>=]//g')"

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0

      # pnpm currently entirely skips resolution during install if a lockfile is present. As a result, peer dependencies
      # are not checked at all. To ensure those are enforced, we first run a separate install command with no lockfile.
      - name: Check peer dependencies
        run: devbox run -- pnpm install --no-lockfile --strict-peer-dependencies

      - name: Install dependencies
        run: devbox run -- pnpm install --frozen-lockfile

      - name: Check TypeScript formatting
        run: devbox run -- pnpm exec prettier --check .

      - name: Lint TypeScript
        run: devbox run -- pnpm exec eslint . --max-warnings 0

      - name: Type check TypeScript
        run: devbox run -- pnpm exec tsc -b --noEmit
